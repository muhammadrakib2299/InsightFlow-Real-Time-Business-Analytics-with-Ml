name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-node:
    name: Lint + typecheck (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspaces --if-present
      - run: npm run typecheck --workspaces --if-present

  test-node:
    name: Test (Node)
    runs-on: ubuntu-latest
    needs: lint-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test --workspaces --if-present

  lint-python:
    name: Lint + typecheck (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, forecast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff black mypy
      - run: pip install -r ${{ matrix.service }}/requirements.txt
        if: hashFiles(format('{0}/requirements.txt', matrix.service)) != ''
      - run: ruff check ${{ matrix.service }}
      - run: black --check ${{ matrix.service }}

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        service: [ingestion, forecast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r ${{ matrix.service }}/requirements.txt
        if: hashFiles(format('{0}/requirements.txt', matrix.service)) != ''
      - run: pip install pytest pytest-asyncio
      - run: pytest ${{ matrix.service }}/tests
        if: hashFiles(format('{0}/tests/**/*.py', matrix.service)) != ''

  smoke-compose:
    name: Smoke test (docker compose)
    runs-on: ubuntu-latest
    needs: [test-node, test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Copy env
        run: cp .env.example .env
      - name: Bring up stack
        run: docker compose -f infra/docker-compose.yml up -d --wait
        continue-on-error: true
      - name: Health probes
        run: |
          for svc in api:4000 ingestion:5000 forecast:8000; do
            name=${svc%:*}
            port=${svc#*:}
            echo "Probing $name on :$port"
            curl --retry 30 --retry-delay 2 --retry-all-errors -fsS \
              "http://localhost:${port}/health" || echo "::warning::$name health probe failed"
          done
        continue-on-error: true
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
