name: insightflow

# Single-host compose stack. Brings up Redpanda, ClickHouse, Postgres, Redis,
# Caddy, and the four application services (api, ingestion, forecast, frontend).
# Designed to run on a Hetzner CX22 (4 GB / 2 vCPU) in production and a developer
# laptop locally. Service ports below are the *container* ports; only the
# frontend (3000), API (4000), forecast (8000), ingestion (5000), ClickHouse
# HTTP (8123), and Caddy (80/443) are published.

x-defaults: &svc-defaults
  restart: unless-stopped
  env_file:
    - ../.env
  networks:
    - insightflow

services:
  # --------------------------------------------------------------------------
  # Streaming and storage
  # --------------------------------------------------------------------------

  redpanda:
    <<: *svc-defaults
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr=internal://redpanda:8082
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --mode=dev-container
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  clickhouse:
    <<: *svc-defaults
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-insightflow}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres:
    <<: *svc-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insightflow}
      POSTGRES_USER: ${POSTGRES_USER:-insightflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insightflow} -d ${POSTGRES_DB:-insightflow}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    <<: *svc-defaults
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

  # --------------------------------------------------------------------------
  # Application services
  # --------------------------------------------------------------------------

  api:
    <<: *svc-defaults
    build:
      context: ../api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  ingestion:
    <<: *svc-defaults
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  ingestion-consumer:
    <<: *svc-defaults
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    command: ["python", "-m", "app.consumer"]
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    # No published port — pure worker.
    healthcheck:
      # Worker has no HTTP; healthy = process alive (pgrep returns 0 with a match).
      test: ["CMD-SHELL", "pgrep -f 'app.consumer' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  forecast:
    <<: *svc-defaults
    build:
      context: ../forecast
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - forecast-artifacts:/app/artifacts
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    <<: *svc-defaults
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # Reverse proxy
  # --------------------------------------------------------------------------

  caddy:
    <<: *svc-defaults
    image: caddy:2.8-alpine
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
      ingestion:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  insightflow:
    driver: bridge

volumes:
  redpanda-data:
  clickhouse-data:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  forecast-artifacts:
